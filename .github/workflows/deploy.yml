name: Deploy

# Деплой при пуше в main. Можно запустить и вручную из вкладки Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/thefootnotes
            git pull --ff-only
            .venv/bin/pip install -r requirements.txt
            sudo systemctl restart thefootnotes
