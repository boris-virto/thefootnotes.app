# nginx-конфиг для дашборда remember_stuff.
# Кладётся в /etc/nginx/sites-available/remember и линкуется в sites-enabled.
# certbot --nginx потом сам допишет сюда блок listen 443 + сертификат и редирект с 80 на 443.

server {
    listen 80;
    server_name thefootnotes.app;

    # Ограничение размера загрузок не нужно — дашборд только отдаёт данные.
    location / {
        # Пароль на дашборд. Файл создаётся командой htpasswd (см. DEPLOY.md).
        auth_basic "remember_stuff";
        auth_basic_user_file /etc/nginx/.htpasswd-remember;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
