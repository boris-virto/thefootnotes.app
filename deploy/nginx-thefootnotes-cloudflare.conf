# nginx-конфиг для дашборда thefootnotes — вариант для Cloudflare с включённой проксёй
# (оранжевое облако). HTTPS для браузера обеспечивает edge Cloudflare; здесь мы
# терминируем HTTPS между Cloudflare и origin по Cloudflare Origin Certificate.
# Требует режим SSL/TLS = Full (strict) в панели Cloudflare. certbot тут НЕ нужен.
#
# Кладётся в /etc/nginx/sites-available/thefootnotes и линкуется в sites-enabled.
# Origin-сертификат и ключ — см. DEPLOY.md, приложение «Cloudflare».

# Порт 80 (Cloudflare стучится сюда, если "Always Use HTTPS" выключен) — редиректим на HTTPS.
server {
    listen 80;
    server_name thefootnotes.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name thefootnotes.app;

    ssl_certificate     /etc/ssl/cloudflare/thefootnotes.pem;
    ssl_certificate_key /etc/ssl/cloudflare/thefootnotes.key;

    # Ограничение размера загрузок не нужно — дашборд только отдаёт данные.
    location / {
        # Авторизация — на стороне приложения (вход по Telegram), basic-auth не нужен.
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
