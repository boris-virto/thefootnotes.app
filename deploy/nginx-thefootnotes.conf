# nginx-конфиг для дашборда thefootnotes.
# Кладётся в /etc/nginx/sites-available/thefootnotes и линкуется в sites-enabled.
# certbot --nginx потом сам допишет сюда блок listen 443 + сертификат и редирект с 80 на 443.

server {
    listen 80;
    server_name thefootnotes.app;

    # Ограничение размера загрузок не нужно — дашборд только отдаёт данные.
    location / {
        # Авторизация — на стороне приложения (вход по Telegram), basic-auth не нужен.
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
